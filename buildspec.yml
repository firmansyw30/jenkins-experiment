version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Installing dependencies"
      - npm install

  pre_build:
    commands:
      - echo "Logging in to Amazon ECR"
      - aws ecr-public get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $REPOSITORY_URI

  build:
    commands:
      - echo "Running tests"
      - npm test
      - echo "Building application"
      - docker build -t my-docker-image .
      - docker tag my-docker-image:latest $REPOSITORY_URI:latest

  post_build:
    commands:
      - echo "Pushing the Docker Image to (Public) ECR"
      - docker push $REPOSITORY_URI:latest

artifacts:
  files:
    - '**/*'
